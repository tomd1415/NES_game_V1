SYMBOLS {
    __STACKSIZE__: type = weak, value = $0300; # 3 pages stack
    NES_CHR_BANKS:	  type = weak, value = 1;  # number of 8K CHR banks
    NES_MIRRORING:    type = weak, value = 1;
    NES_MAPPER:	  type = weak, value = 0;
}
MEMORY {
    # Zero page.  $0002-$00FF (254 bytes).  cc65's nes runtime uses
    # the first chunk; the FamiStudio engine claims ~8 bytes more
    # when the audio module is enabled (Phase 4.3).  The 6502
    # hardware stack lives at $0100-$01FF and is untouched by ZP.
    ZP:     file = "", start = $0002, size = $00FE, type = rw, define = yes;

    # INES Cartridge Header
    HEADER: file = %O, start = $0000, size = $0010, fill = yes;

    # 2 16K ROM Banks
    # - startup
    # - code
    # - rodata
    # - data (load)
    ROM0:   file = %O, start = $8000, size = $7FFA, fill = yes, define = yes;

    # Hardware Vectors at End of 2nd 8K ROM
    ROMV:   file = %O, start = $FFFA, size = $0006, fill = yes;

    # 1 8k CHR Bank
    CHR:   file = %O, start = $0000, size = $4000, fill = yes ;

    # standard 2k SRAM (-zeropage)
    # $0100-$0200 cpu stack
    # $0200-$02FF DMA-aligned OAM shadow (sprite table built in RAM each
    #             frame, then copied to the PPU in one ~513-cycle burst
    #             via $4014 — critical for staying inside the ~2273-cycle
    #             NTSC vblank when the scene has many sprites)
    # $0300-$0500 2 pages free for future ppu-memory write buffers
    # $0500-$0800 3 pages for cc65 parameter stack
    OAM:    file = "", start = $0200, size = $0100, define = yes;
    SRAM:   file = "", start = $0500, size = __STACKSIZE__, define = yes;

    # additional 8K SRAM Bank
    # - data (run)
    # - bss
    # - heap
    RAM:    file = "", start = $6000, size = $2000, define = yes;
}
SEGMENTS {
    ZEROPAGE:        load = ZP,              type = zp;
    # Phase 4.3 — the FamiStudio sound engine declares its own ZP /
    # BSS / CODE segments with explicit `: zeropage` / `: bss`
    # attributes that clash with cc65's pre-declared ZEROPAGE / BSS
    # segments.  Giving the engine its own segment names that share
    # the same memory areas keeps both pieces of code happy without
    # re-declaring anything.  Marked `optional = yes` so a no-audio
    # build (which doesn't produce these segments) still links.
    FAMISTUDIO_ZP:   load = ZP,              type = zp,  optional = yes;
    HEADER:          load = HEADER,          type = ro;
    STARTUP:         load = ROM0,            type = ro,  define   = yes;
    LOWCODE:         load = ROM0,            type = ro,  optional = yes;
    ONCE:            load = ROM0,            type = ro,  optional = yes;
    CODE:            load = ROM0,            type = ro,  define   = yes;
    FAMISTUDIO_CODE: load = ROM0,            type = ro,  optional = yes;
    RODATA:          load = ROM0,            type = ro,  define   = yes;
    DATA:            load = ROM0, run = RAM, type = rw,  define   = yes;
    VECTORS:         load = ROMV,            type = rw;
    CHARS:           load = CHR,             type = rw;
    BSS:             load = RAM,             type = bss, define   = yes;
    FAMISTUDIO_BSS:  load = RAM,             type = bss, optional = yes;
    OAM:             load = OAM,             type = bss;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
